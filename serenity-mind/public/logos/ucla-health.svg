<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 70" fill="#111827">
  <!-- UCLA Health — "UCLA" inside a filled rectangle, "Health" in serif below -->

  <!-- Blue rectangle background for "UCLA" text -->
  <rect x="20" y="4" width="100" height="32" rx="1" fill="#111827"/>
  <!-- "UCLA" white knockout text inside the rectangle -->
  <text x="70" y="29" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" text-anchor="middle" letter-spacing="3" fill="white">UCLA</text>

  <!-- "Health" in serif below the box -->
  <text x="70" y="58" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="400" text-anchor="middle">Health</text>
</svg>
