<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 70" fill="#9CA3AF">
  <!-- UCLA Health — horizontal layout: dark box + serif text -->
  <!-- Left: dark rectangle with white bold italic "UCLA" -->
  <rect x="0" y="0" width="95" height="70" rx="2" fill="#9CA3AF"/>
  <text x="48" y="48" font-family="'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="700" font-style="italic" text-anchor="middle" fill="white">UCLA</text>
  <!-- Right: serif "Health" text -->
  <text x="175" y="50" font-family="Georgia, 'Times New Roman', serif" font-size="44" font-weight="400" text-anchor="middle" fill="#9CA3AF">Health</text>
</svg>