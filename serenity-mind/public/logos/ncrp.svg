<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 60" fill="#111827">
  <!-- NCRP logo — brain-shaped dot cluster (left) + stacked text (right) -->
  <!-- Brain dot cluster — circles of varying sizes arranged in brain shape -->
  <g transform="translate(0, 4)">
    <!-- Large circles -->
    <circle cx="22" cy="18" r="5.5"/>
    <circle cx="10" cy="28" r="4.5"/>
    <circle cx="34" cy="14" r="4"/>
    <circle cx="18" cy="34" r="5"/>
    <circle cx="32" cy="26" r="5.5"/>
    <!-- Medium circles -->
    <circle cx="8" cy="16" r="3"/>
    <circle cx="40" cy="22" r="3.5"/>
    <circle cx="26" cy="38" r="3.5"/>
    <circle cx="38" cy="34" r="3"/>
    <circle cx="14" cy="10" r="3"/>
    <!-- Small circles -->
    <circle cx="44" cy="14" r="2.5"/>
    <circle cx="28" cy="8" r="2.5"/>
    <circle cx="42" cy="40" r="2"/>
    <circle cx="6" cy="38" r="2"/>
    <circle cx="46" cy="30" r="2"/>
    <circle cx="16" cy="44" r="2.5"/>
    <circle cx="34" cy="44" r="2"/>
    <!-- Tiny accent dots -->
    <circle cx="48" cy="20" r="1.5"/>
    <circle cx="2" cy="22" r="1.5"/>
    <circle cx="24" cy="48" r="1.5"/>
    <circle cx="44" cy="44" r="1.5"/>
    <circle cx="12" cy="46" r="1"/>
    <circle cx="50" cy="38" r="1"/>
  </g>
  <!-- Text — "NATIONAL CURRICULUM IN" small, "REPRODUCTIVE PSYCHIATRY" bold -->
  <text x="62" y="20" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="400" letter-spacing="1.2">NATIONAL CURRICULUM IN</text>
  <text x="62" y="35" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" letter-spacing="0.5">REPRODUCTIVE</text>
  <text x="62" y="50" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" letter-spacing="0.5">PSYCHIATRY</text>
</svg>
